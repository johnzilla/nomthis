<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nomthis — What's in your fridge?</title>
  <meta name="description" content="Type in your ingredients, get a recipe. Powered by AI.">
  <meta property="og:title" content="nomthis — What's in your fridge?">
  <meta property="og:description" content="Type in your ingredients, get a recipe. Powered by AI.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nomthis.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="nomthis — What's in your fridge?">
  <meta name="twitter:description" content="Type in your ingredients, get a recipe. Powered by AI.">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      text-align: center;
      padding: 60px 0 40px;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111;
    }

    header p {
      font-size: 1.2rem;
      color: #666;
      margin-top: 8px;
    }

    .input-area {
      margin-bottom: 32px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      background: #fff;
    }

    textarea:focus {
      outline: none;
      border-color: #f97316;
    }

    textarea::placeholder { color: #aaa; }

    button#submit {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#submit:hover { background: #ea580c; }
    button#submit:disabled { background: #ccc; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 40px 0;
      display: none;
    }

    .loading.active { display: block; }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      margin-top: 12px;
      color: #888;
      font-size: 0.95rem;
    }

    #result {
      display: none;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 40px;
    }

    #result.active { display: block; }

    #result h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: #111;
    }

    #result h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 8px;
      color: #333;
    }

    #result p { margin-bottom: 8px; }

    #result ul, #result ol {
      padding-left: 24px;
      margin-bottom: 12px;
    }

    #result li { margin-bottom: 4px; }

    #result a {
      color: #f97316;
      text-decoration: none;
      font-weight: 500;
    }

    #result a:hover { text-decoration: underline; }

    #result strong { font-weight: 700; }

    .affiliate-section {
      background: #fef9f3;
      border: 1px solid #fde0b8;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 24px;
    }

    .affiliate-section h2 {
      margin-top: 0 !important;
      color: #b45309;
    }

    .affiliate-section a {
      display: inline-block;
      background: #f97316;
      color: #fff !important;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .affiliate-section a:hover {
      background: #ea580c;
      text-decoration: none !important;
    }

    .share-bar {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .share-bar.active { display: flex; }

    .share-bar button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #444;
      transition: background 0.15s;
    }

    .share-bar button:hover { background: #f5f5f5; }

    .share-bar button#remixBtn {
      background: #f97316;
      color: #fff;
      border-color: #f97316;
    }

    .share-bar button#remixBtn:hover { background: #ea580c; border-color: #ea580c; }

    .error {
      color: #dc2626;
      text-align: center;
      padding: 12px;
      display: none;
    }

    .error.active { display: block; }

    footer {
      text-align: center;
      padding: 40px 0;
      color: #aaa;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      header { padding: 40px 0 28px; }
      header h1 { font-size: 2.2rem; }
      #result { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>What's in your fridge?</h1>
      <p>Nom this.</p>
    </header>

    <div class="input-area">
      <textarea id="ingredients" placeholder="chicken thighs, rice, soy sauce, garlic, ginger..." maxlength="500"></textarea>
      <button id="submit">Nom This</button>
    </div>

    <div class="error" id="error"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Cooking up something good...</p>
    </div>

    <div id="result">
      <div id="recipe"></div>
      <div class="share-bar" id="shareBar">
        <button onclick="remix()" id="remixBtn">Remix</button>
        <button onclick="shareTwitter()">Share on X</button>
        <button onclick="shareFacebook()">Share on Facebook</button>
        <button onclick="copyRecipe()">Copy Recipe</button>
        <button onclick="nativeShare()" id="nativeShareBtn" style="display:none">Share</button>
      </div>
    </div>

    <footer>nomthis.com</footer>
  </div>

  <script>
    const form = document.getElementById("ingredients");
    const btn = document.getElementById("submit");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const recipeEl = document.getElementById("recipe");
    const shareBar = document.getElementById("shareBar");
    const errorEl = document.getElementById("error");

    let recipeTitle = "";
    let recipeText = "";

    if (navigator.share) {
      document.getElementById("nativeShareBtn").style.display = "";
    }

    btn.addEventListener("click", async () => {
      const ingredients = form.value.trim();
      if (!ingredients) {
        showError("Type in some ingredients first.");
        return;
      }

      hideError();
      btn.disabled = true;
      loading.classList.add("active");
      result.classList.remove("active");
      shareBar.classList.remove("active");

      try {
        const res = await fetch("/api/recipe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ingredients }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Something went wrong.");
        }

        recipeText = data.recipe;
        recipeEl.innerHTML = marked.parse(data.recipe);
        recipeEl.querySelectorAll("a[href]").forEach(a => {
          a.target = "_blank";
          a.rel = "noopener noreferrer";
        });

        // Wrap affiliate sections in styled cards
        recipeEl.querySelectorAll("h2").forEach(h2 => {
          const text = h2.textContent.toLowerCase();
          if (text.includes("buy") || text.includes("gear")) {
            const wrapper = document.createElement("div");
            wrapper.className = "affiliate-section";
            h2.before(wrapper);
            wrapper.appendChild(h2);
            let next = wrapper.nextSibling;
            while (next && !(next.nodeType === 1 && next.tagName === "H2")) {
              const current = next;
              next = next.nextSibling;
              wrapper.appendChild(current);
            }
          }
        });
        recipeTitle = recipeEl.querySelector("h1")?.textContent || "a recipe";
        result.classList.add("active");
        shareBar.classList.add("active");
        result.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove("active");
      }
    });

    form.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        btn.click();
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("active");
    }

    function hideError() {
      errorEl.classList.remove("active");
    }

    function shareTwitter() {
      const text = encodeURIComponent(`I just made ${recipeTitle} with nomthis.com!`);
      window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
    }

    function shareFacebook() {
      const url = encodeURIComponent("https://nomthis.com");
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, "_blank");
    }

    function copyRecipe() {
      navigator.clipboard.writeText(recipeText).then(() => {
        const btn = document.querySelector(".share-bar button:nth-child(3)");
        const orig = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = orig), 2000);
      });
    }

    function remix() {
      btn.click();
    }

    function nativeShare() {
      navigator.share({
        title: recipeTitle,
        text: `Check out this recipe: ${recipeTitle}`,
        url: "https://nomthis.com",
      });
    }
  </script>
</body>
</html>
