<!DOCTYPE html>
<html lang="en">
<head>

  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Manrope:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    :root {
      --accent: #EF5B2A;
      --accent-hover: #B93817;
      --accent-light: #FFF0EC;
      --accent-border: #FFCDB8;
      --accent-dark: #B93817;
      --accent-brown: #B93817;
      --highlight: #FFD15C;
      --border: #D8BFA7;
      --bg: #F5EADB;
      --card-bg: #FFF8EF;
      --text: #2A211D;
      --text-dark: #2A211D;
      --text-mid: #2A211D;
      --text-light: #6F6259;
      --text-muted: #6F6259;
      --text-faint: #9A8E82;
      --error: #CC1100;
      --affiliate-bg: #FFF5E6;
      --affiliate-border: #FFD15C;
      --chef-gary: #FF2E00;
      --chef-gordo: #FFB800;
      --chef-nonna: #2D8C3C;
      --chef-coach: #3B82F6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      text-align: center;
      padding: 60px 0 40px;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text-dark);
    }

    header p {
      font-family: 'Manrope', sans-serif;
      font-size: 1.2rem;
      color: var(--text-light);
      margin-top: 8px;
    }

    .personality-carousel {
      position: relative;
      margin-bottom: 20px;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-mid);
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .carousel-arrow:hover {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .carousel-arrow.left { left: -18px; }
    .carousel-arrow.right { right: -18px; }
    .carousel-arrow.hidden { display: none; }

    .personality-selector {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 4px 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      align-items: stretch;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
    }

    .personality-selector::-webkit-scrollbar { display: none; }

    .personality-card {
      flex: 0 0 140px;
      scroll-snap-align: start;
      padding: 14px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }

    .personality-card:hover { border-color: var(--accent); }

    .personality-card.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 3px 3px 0 var(--accent);
    }

    .personality-card .name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .personality-card .tagline {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .personality-card .quote {
      font-size: 0.7rem;
      font-style: italic;
      color: var(--text-light);
      margin-top: 4px;
    }

    .personality-card .lock {
      font-size: 0.7rem;
      color: var(--accent);
      margin-top: 4px;
    }

    .personality-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .input-area.hidden { display: none; }

    .input-area {
      margin-bottom: 32px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      background: var(--card-bg);
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--text-faint); }

    button#submit {
      display: block;
      flex: 1;
      padding: 14px;
      background: var(--accent);
      color: var(--card-bg);
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.1s;
      box-shadow: 3px 3px 0 var(--accent-hover);
    }

    button#submit:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--accent-hover); }
    button#submit:disabled { background: #ccc; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 40px 0;
      display: none;
    }

    .loading.active { display: block; }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    #result {
      display: none;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 40px;
    }

    #result.active { display: block; }

    #chefBadge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 4px;
      background: var(--accent);
      color: var(--card-bg);
      margin-bottom: 12px;
    }

    #result h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    #result h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      margin-top: 24px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--border);
      color: var(--accent);
    }

    #result p { margin-bottom: 8px; }

    #result ul, #result ol {
      padding-left: 24px;
      margin-bottom: 12px;
    }

    #result li { margin-bottom: 4px; }

    #result a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    #result a:hover { text-decoration: underline; }

    #result strong { font-weight: 700; }

    .affiliate-section {
      background: var(--affiliate-bg);
      border: 1px solid var(--affiliate-border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-top: 24px;
    }

    .affiliate-section h2 {
      margin-top: 0 !important;
      color: var(--accent-brown);
    }

    .affiliate-section a {
      display: inline-block;
      background: var(--accent);
      color: var(--card-bg) !important;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .affiliate-section a:hover {
      background: var(--accent-hover);
      text-decoration: none !important;
    }

    .share-bar {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .share-bar.active { display: flex; }

    .share-bar button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-mid);
      transition: background 0.15s;
    }

    .share-bar button:hover { background: #f5f5f5; }

    .share-bar button#remixBtn {
      background: var(--accent);
      color: var(--card-bg);
      border-color: var(--accent);
    }

    .share-bar button#remixBtn:hover { background: var(--accent-hover); border-color: #ea580c; }

    .error {
      color: var(--error);
      text-align: center;
      padding: 12px;
      display: none;
    }

    .error.active { display: block; }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-faint);
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      header { padding: 40px 0 20px; }
      header h1 { font-size: 2.2rem; }
      header p { font-size: 1rem; }
      #result { padding: 16px; }

      .carousel-arrow { display: none; }

      .personality-card {
        flex: 0 0 120px;
        padding: 10px 8px;
        min-height: 44px;
      }

      .personality-card .name { font-size: 0.85rem; }
      .personality-card .tagline { font-size: 0.7rem; }

      textarea { min-height: 100px; font-size: 16px; }

      button#submit {
        padding: 16px;
        font-size: 1.15rem;
        min-height: 50px;
      }

      .share-bar button {
        padding: 10px 14px;
        min-height: 44px;
      }
    }

    .camera-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .camera-btn {
      flex: 0 0 auto;
      padding: 14px 20px;
      background: var(--card-bg);
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.1s;
      min-height: 50px;
      box-shadow: 3px 3px 0 var(--border);
    }

    .camera-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--border); }

    #cameraInput { display: none; }

    .tag-editor {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0;
    }

    .tag-editor.active { display: flex; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--accent-dark);
    }

    .tag .remove {
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      color: var(--accent);
    }

    .tag .remove:hover { color: var(--error); }

    .add-tag-input {
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.9rem;
      outline: none;
      min-width: 120px;
      background: var(--card-bg);
    }

    .add-tag-input:focus { border-color: var(--accent); }

    .tag-actions {
      display: none;
      gap: 8px;
      margin-top: 4px;
    }

    .tag-actions.active { display: flex; }

    .tag-generate-btn {
      flex: 1;
      padding: 14px;
      background: var(--accent);
      color: var(--card-bg);
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--accent-hover);
      transition: transform 0.1s;
    }

    .tag-generate-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--accent-hover); }

    #visionLoading {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    #visionLoading.active { display: block; }

    #visionLoading p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>What's in your fridge?</h1>
      <p>Nom this.</p>
    </header>

    <div class="personality-carousel">
      <button class="carousel-arrow left hidden" id="carouselLeft" aria-label="Scroll left">&#8249;</button>
      <div class="personality-selector" id="personalitySelector"></div>
      <button class="carousel-arrow right" id="carouselRight" aria-label="Scroll right">&#8250;</button>
    </div>

    <div class="input-area">
      <textarea id="ingredients" placeholder="chicken thighs, rice, soy sauce, garlic, ginger..." maxlength="500"></textarea>
      <div class="camera-row">
        <button id="submit">Nom This</button>
        <button class="camera-btn" id="cameraBtn" aria-label="Snap your fridge to identify ingredients">📷 Snap Fridge</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
      </div>
    </div>

    <div id="visionLoading">
      <div class="spinner"></div>
      <p id="visionStatus">Looking in your fridge...</p>
    </div>

    <div class="tag-editor" id="tagEditor"></div>
    <div class="tag-actions" id="tagActions">
      <button class="tag-generate-btn" id="tagGenerateBtn">Nom This</button>
    </div>

    <div class="error" id="error"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Cooking up something good...</p>
    </div>

    <div id="result">
      <span id="chefBadge" style="display:none"></span>
      <div id="recipe"></div>
      <div class="share-bar" id="shareBar">
        <button onclick="remix()" id="remixBtn">Remix</button>
        <button onclick="shareTwitter()">Share on X</button>
        <button onclick="shareFacebook()">Share on Facebook</button>
        <button onclick="copyRecipe()">Copy Recipe</button>
        <button onclick="nativeShare()" id="nativeShareBtn" style="display:none">Share</button>
      </div>
    </div>

    <footer>nomthis.com</footer>
  </div>

  <script>
    const form = document.getElementById("ingredients");
    const btn = document.getElementById("submit");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const recipeEl = document.getElementById("recipe");
    const shareBar = document.getElementById("shareBar");
    const errorEl = document.getElementById("error");

    let recipeTitle = "";
    let recipeText = "";
    let selectedPersonality = localStorage.getItem("personality") || "classic";
    let selectedPersonalityName = "The Classic";
    let personalityData = {};

    if (navigator.share) {
      document.getElementById("nativeShareBtn").style.display = "";
    }

    // Load and render personality selector
    const selectorEl = document.getElementById("personalitySelector");
    selectorEl.setAttribute("role", "radiogroup");
    selectorEl.setAttribute("aria-label", "Choose a chef personality");

    function selectCard(card, id) {
      selectedPersonality = id;
      selectedPersonalityName = personalityData[id]?.name || "The Classic";
      localStorage.setItem("personality", id);
      selectorEl.querySelectorAll(".personality-card").forEach(c => {
        c.classList.remove("selected");
        c.setAttribute("aria-checked", "false");
        c.setAttribute("tabindex", "-1");
      });
      card.classList.add("selected");
      card.setAttribute("aria-checked", "true");
      card.setAttribute("tabindex", "0");
      card.focus();
    }

    fetch("/api/personalities").then(r => r.json()).then(personalities => {
      personalities.forEach((p, i) => {
        const card = document.createElement("div");
        const isSelected = p.id === selectedPersonality;
        card.className = "personality-card" + (isSelected ? " selected" : "");
        card.dataset.id = p.id;
        card.setAttribute("role", "radio");
        card.setAttribute("aria-checked", isSelected ? "true" : "false");
        card.setAttribute("tabindex", isSelected ? "0" : "-1");
        card.innerHTML = `<div class="name">${p.name}</div><div class="tagline">${p.tagline}</div>${p.quote ? '<div class="quote">"' + p.quote + '"</div>' : ''}${p.premium ? '<div class="lock">Premium</div>' : ''}`;
        personalityData[p.id] = p;
        card.addEventListener("click", () => {
          if (p.premium) {
            showError(`${p.name} is a premium personality. Coming soon!`);
            setTimeout(hideError, 3000);
            return;
          }
          selectCard(card, p.id);
        });
        card.addEventListener("keydown", (e) => {
          const cards = [...selectorEl.querySelectorAll(".personality-card")];
          const idx = cards.indexOf(card);
          if (e.key === "ArrowRight" || e.key === "ArrowDown") {
            e.preventDefault();
            const next = cards[(idx + 1) % cards.length];
            selectCard(next, next.dataset.id);
          } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
            e.preventDefault();
            const prev = cards[(idx - 1 + cards.length) % cards.length];
            selectCard(prev, prev.dataset.id);
          } else if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            selectCard(card, p.id);
          }
        });
        selectorEl.appendChild(card);
      });
      updateArrows();
    });

    // Carousel arrows
    const arrowLeft = document.getElementById("carouselLeft");
    const arrowRight = document.getElementById("carouselRight");

    function updateArrows() {
      const { scrollLeft, scrollWidth, clientWidth } = selectorEl;
      arrowLeft.classList.toggle("hidden", scrollLeft <= 4);
      arrowRight.classList.toggle("hidden", scrollLeft + clientWidth >= scrollWidth - 4);
    }

    arrowLeft.addEventListener("click", () => {
      selectorEl.scrollBy({ left: -150, behavior: "smooth" });
    });
    arrowRight.addEventListener("click", () => {
      selectorEl.scrollBy({ left: 150, behavior: "smooth" });
    });
    selectorEl.addEventListener("scroll", updateArrows);

    // Camera mode
    const cameraBtn = document.getElementById("cameraBtn");
    const cameraInput = document.getElementById("cameraInput");
    const visionLoading = document.getElementById("visionLoading");
    const visionStatus = document.getElementById("visionStatus");
    const tagEditor = document.getElementById("tagEditor");
    const tagActions = document.getElementById("tagActions");
    const tagGenerateBtn = document.getElementById("tagGenerateBtn");

    const visionMessages = [
      "Looking in your fridge...",
      "Checking the crisper drawer...",
      "Identifying ingredients...",
      "Spotting what's fresh...",
      "Almost done...",
    ];

    cameraBtn.addEventListener("click", () => cameraInput.click());

    cameraInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      hideError();
      tagEditor.classList.remove("active");
      tagActions.classList.remove("active");
      visionLoading.classList.add("active");

      // Rotating status messages
      let msgIdx = 0;
      visionStatus.textContent = visionMessages[0];
      const msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % visionMessages.length;
        visionStatus.textContent = visionMessages[msgIdx];
      }, 1500);

      try {
        const resized = await resizeImage(file, 1024, 0.8);
        const formData = new FormData();
        formData.append("image", resized, "photo.jpg");

        const res = await fetch("/api/identify", { method: "POST", body: formData });
        const data = await res.json();

        clearInterval(msgInterval);
        visionLoading.classList.remove("active");

        if (data.fallback && data.ingredients?.length === 0) {
          showError(data.error || "Couldn't identify ingredients. Try typing them.");
          return;
        }
        if (!res.ok) {
          showError(data.error || "Something went wrong with the image.");
          return;
        }

        renderTags(data.ingredients);
      } catch (err) {
        clearInterval(msgInterval);
        visionLoading.classList.remove("active");
        showError("Couldn't process the image. Try typing your ingredients instead.");
      }

      cameraInput.value = "";
    });

    function resizeImage(file, maxSize, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          let { width, height } = img;
          if (width > maxSize || height > maxSize) {
            if (width > height) {
              height = Math.round((height * maxSize) / width);
              width = maxSize;
            } else {
              width = Math.round((width * maxSize) / height);
              height = maxSize;
            }
          }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          canvas.toBlob(resolve, "image/jpeg", quality);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    const inputArea = document.querySelector(".input-area");

    function dismissTags() {
      tagEditor.classList.remove("active");
      tagActions.classList.remove("active");
      inputArea.classList.remove("hidden");
    }

    function renderTags(ingredients) {
      tagEditor.innerHTML = "";
      ingredients.forEach(name => addTag(name));
      const addInput = document.createElement("input");
      addInput.className = "add-tag-input";
      addInput.placeholder = "+ add";
      addInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && addInput.value.trim()) {
          addTag(addInput.value.trim());
          tagEditor.insertBefore(tagEditor.lastElementChild, addInput);
          addInput.value = "";
          tagEditor.appendChild(addInput);
        }
      });
      tagEditor.appendChild(addInput);

      // "Type instead" link
      const typeLink = document.createElement("a");
      typeLink.href = "#";
      typeLink.textContent = "type instead";
      typeLink.style.cssText = "font-size:0.8rem;color:var(--text-muted);margin-left:auto;align-self:center;";
      typeLink.addEventListener("click", (e) => { e.preventDefault(); dismissTags(); });
      tagEditor.appendChild(typeLink);

      tagEditor.classList.add("active");
      tagActions.classList.add("active");
      inputArea.classList.add("hidden");
    }

    function addTag(name) {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.innerHTML = `${name} <span class="remove">&times;</span>`;
      tag.querySelector(".remove").addEventListener("click", () => tag.remove());
      tagEditor.appendChild(tag);
    }

    tagGenerateBtn.addEventListener("click", () => {
      const tags = Array.from(tagEditor.querySelectorAll(".tag"))
        .map(t => t.firstChild.textContent.trim());
      if (tags.length === 0) {
        showError("Add some ingredients first.");
        return;
      }
      form.value = tags.join(", ");
      btn.click();
    });

    function wrapAffiliateCards() {
      recipeEl.querySelectorAll("a[href]").forEach(a => {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });
      recipeEl.querySelectorAll("h2").forEach(h2 => {
        const text = h2.textContent.toLowerCase();
        if (text.includes("buy") || text.includes("gear")) {
          const wrapper = document.createElement("div");
          wrapper.className = "affiliate-section";
          h2.before(wrapper);
          wrapper.appendChild(h2);
          let next = wrapper.nextSibling;
          while (next && !(next.nodeType === 1 && next.tagName === "H2")) {
            const current = next;
            next = next.nextSibling;
            wrapper.appendChild(current);
          }
        }
      });
    }

    btn.addEventListener("click", async () => {
      const ingredients = form.value.trim();
      if (!ingredients) {
        showError("Type in some ingredients first.");
        return;
      }

      hideError();
      btn.disabled = true;
      loading.classList.add("active");
      result.classList.remove("active");
      shareBar.classList.remove("active");
      recipeText = "";

      try {
        const res = await fetch("/api/recipe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ingredients, personalityId: selectedPersonality }),
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || "Something went wrong.");
        }

        loading.classList.remove("active");
        // Show chef attribution
        const chefBadge = document.getElementById("chefBadge");
        chefBadge.textContent = selectedPersonalityName;
        chefBadge.style.display = "inline-block";
        result.classList.add("active");
        result.scrollIntoView({ behavior: "smooth", block: "start" });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const json = line.slice(6);
            let event;
            try { event = JSON.parse(json); } catch { continue; }

            if (event.type === "token") {
              recipeText += event.text;
              recipeEl.innerHTML = DOMPurify.sanitize(marked.parse(recipeText));
            } else if (event.type === "done") {
              recipeEl.innerHTML = DOMPurify.sanitize(marked.parse(recipeText));
              wrapAffiliateCards();
              recipeTitle = recipeEl.querySelector("h1")?.textContent || "a recipe";
              shareBar.classList.add("active");
            } else if (event.type === "error") {
              throw new Error(event.message);
            }
          }
        }
      } catch (err) {
        showError(err.message);
        result.classList.remove("active");
      } finally {
        btn.disabled = false;
        loading.classList.remove("active");
      }
    });

    form.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        btn.click();
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("active");
    }

    function hideError() {
      errorEl.classList.remove("active");
    }

    function shareTwitter() {
      const text = encodeURIComponent(`I just made ${recipeTitle} with nomthis.com!`);
      window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
    }

    function shareFacebook() {
      const url = encodeURIComponent("https://nomthis.com");
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, "_blank");
    }

    function copyRecipe() {
      navigator.clipboard.writeText(recipeText).then(() => {
        const btn = document.querySelector(".share-bar button:nth-child(3)");
        const orig = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = orig), 2000);
      });
    }

    function remix() {
      btn.click();
    }

    function nativeShare() {
      navigator.share({
        title: recipeTitle,
        text: `Check out this recipe: ${recipeTitle}`,
        url: "https://nomthis.com",
      });
    }
  </script>
</body>
</html>
