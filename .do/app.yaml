spec:
  name: nomthis
  services:
    - name: web
      source_dir: /
      github:
        repo: nomthis/nomthis
        branch: main
        deploy_on_push: true
      run_command: node server.js
      environment_slug: node-js
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      http_port: 3000
      envs:
        - key: ANTHROPIC_API_KEY
          scope: RUN_TIME
          type: SECRET
